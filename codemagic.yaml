workflows:
  ios-workflow:
    name: iOS Wallet Build
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Generate iOS Project
        script: |
          # This creates the missing ios/ folder automatically
          flutter create . --platforms ios --project-name wallet
      - name: Install dependencies
        script: flutter pub get
      - name: Build iOS IPA
        script: flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa